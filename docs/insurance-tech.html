<style>
  .gate {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background: radial-gradient(1200px 800px at 20% 10%, #131a36 0%, #0b1020 60%, #070b1a 100%);
    z-index: 100;
  }
  .gate-card {
    width: 100%; max-width: 420px;
    background: linear-gradient(180deg, #131a36 0%, #0f1530 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 32px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.45);
    color: #e7ecf5;
    font-family: "Inter", "Segoe UI", -apple-system, sans-serif;
  }
  .gate-card .accent {
    height: 4px; width: 60px; border-radius: 4px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    margin-bottom: 18px;
  }
  .gate-card h1 {
    font-size: 22px; margin: 0 0 6px;
    background: linear-gradient(120deg, #fff, #93c5fd 60%, #3b82f6);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .gate-card p { color: #aab4cf; font-size: 14px; margin: 0 0 20px; }
  .gate-card label { font-size: 12px; color: #aab4cf; text-transform: uppercase; letter-spacing: 0.12em; }
  .gate-card input[type="password"] {
    width: 100%; padding: 12px 14px;
    margin-top: 6px; margin-bottom: 14px;
    background: #1a2348; color: #fff;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; font-size: 15px;
    outline: none;
  }
  .gate-card input[type="password"]:focus { border-color: #60a5fa; }
  .gate-card button {
    width: 100%; padding: 12px 14px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    color: #06122a; font-weight: 700;
    border: 0; border-radius: 10px; cursor: pointer; font-size: 15px;
  }
  .gate-card button:hover { filter: brightness(1.1); }
  .gate-card .err { color: #fda4af; font-size: 13px; margin-top: 10px; min-height: 18px; }
  .gate-card .meta { color: #6f7aa1; font-size: 12px; margin-top: 16px; text-align: center; }
  body.unlocked .gate { display: none; }
</style>

<script src="./assets/crypto.js"></script>
<script>
(async function () {
  const payload = JSON.parse(document.getElementById("payload").textContent);
  const gate = document.getElementById("gate");
  const form = document.getElementById("gateForm");
  const pwdInput = document.getElementById("pwd");
  const err = document.getElementById("err");
  const contentEl = document.getElementById("content");

  async function unlock(password) {
    try {
      const html = await StrategyCrypto.decrypt(payload, password);
      // Persist derived key material reference: we re-store password only for session
      // (kept in sessionStorage so other encrypted pages decrypt without prompt).
      sessionStorage.setItem("strategy_os_pw", password);
      renderHtml(html);
      document.body.classList.add("unlocked");
    } catch (e) {
      err.textContent = "Wrong password.";
      pwdInput.value = "";
      pwdInput.focus();
    }
  }

  function renderHtml(html) {
    // Extract <body> content if a full document was encrypted
    const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
    if (headMatch) {
      const titleMatch = headMatch[1].match(/<title>([^<]*)<\/title>/i);
      if (titleMatch) document.title = titleMatch[1];
    }
    const bodyHtml = bodyMatch ? bodyMatch[1] : html;
    // Apply body class from original document (e.g., theme-visa)
    const bodyClassMatch = html.match(/<body[^>]*class="([^"]*)"/i);
    if (bodyClassMatch) {
      document.body.className = bodyClassMatch[1] + " unlocked";
    }
    contentEl.innerHTML = bodyHtml;
    // Re-execute scripts (innerHTML doesn't run them)
    contentEl.querySelectorAll("script").forEach(function (oldScript) {
      const s = document.createElement("script");
      Array.from(oldScript.attributes).forEach(function (a) { s.setAttribute(a.name, a.value); });
      s.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(s, oldScript);
    });
  }

  // Try cached password first
  const cached = sessionStorage.getItem("strategy_os_pw");
  if (cached) {
    try {
      const html = await StrategyCrypto.decrypt(payload, cached);
      renderHtml(html);
      document.body.classList.add("unlocked");
      return;
    } catch (e) {
      sessionStorage.removeItem("strategy_os_pw");
    }
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    err.textContent = "";
    await unlock(pwdInput.value);
  });
})();
</script>

</body>
